<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Performance Dashboard - Region Sumatera</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom scrollbar untuk tabel agar tetap rapi */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 antialiased">

    <!-- TOP NAVIGATION BAR -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 px-4 py-3 shadow-xs">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-3 w-full sm:w-auto">
                <div class="bg-blue-600 text-white p-2.5 rounded-xl shadow-md shadow-blue-200">
                    <i class="fa-solid fa-chart-line text-lg flex items-center justify-center h-5 w-5"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-900">Region Sumatera</h1>
                    <p class="text-xs text-slate-500 font-medium flex items-center gap-1">
                        <i class="fa-solid fa-layer-group text-blue-500"></i> Sales Performance Dashboard
                    </p>
                </div>
            </div>
            
            <!-- Filter Controls -->
            <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto justify-end">
                <div class="relative w-full sm:w-40">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400 text-xs">
                        <i class="fa-solid fa-file-csv"></i>
                    </span>
                    <select id="file-select" class="w-full bg-slate-50 border border-slate-300 text-slate-700 py-1.5 pl-8 pr-8 rounded-lg text-xs font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 appearance-none cursor-pointer">
                        <option value="dana.csv">dana.csv</option>
                        <option value="landing.csv">landing.csv</option>
                    </select>
                    <span class="absolute inset-y-0 right-0 flex items-center pr-2.5 pointer-events-none text-slate-400 text-[10px]">
                        <i class="fa-solid fa-chevron-down"></i>
                    </span>
                </div>

                <div class="relative w-full sm:w-36">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400 text-xs">
                        <i class="fa-solid fa-calendar-days"></i>
                    </span>
                    <select id="period-select" class="w-full bg-slate-50 border border-slate-300 text-slate-700 py-1.5 pl-8 pr-8 rounded-lg text-xs font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 appearance-none cursor-pointer">
                        <!-- Otomatis diisi oleh JavaScript -->
                    </select>
                    <span class="absolute inset-y-0 right-0 flex items-center pr-2.5 pointer-events-none text-slate-400 text-[10px]">
                        <i class="fa-solid fa-chevron-down"></i>
                    </span>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT CONTAINER -->
    <main class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
        
        <!-- DYNAMIC HEADER TITLE & DATE -->
        <div class="bg-white rounded-2xl border border-slate-200 p-4 md:p-5 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 shadow-xs">
            <div>
                <h2 id="dashboard-title" class="text-lg font-bold text-slate-900 tracking-tight">Performance Summary</h2>
                <p id="as-of-date" class="text-xs text-slate-500 font-medium mt-0.5 hidden"></p>
            </div>
            <div id="loading-indicator" class="hidden items-center gap-2 bg-blue-50 text-blue-700 px-3 py-1.5 rounded-full text-xs font-semibold border border-blue-100 animate-pulse">
                <i class="fa-solid fa-circle-notch animate-spin"></i> Refreshing Data...
            </div>
        </div>

        <!-- KPI CARDS GRID -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            
            <!-- KPI 1: Grand Total -->
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-xs flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-start">
                        <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">Total Booking</p>
                        <div class="p-2 bg-blue-50 text-blue-600 rounded-xl">
                            <i class="fa-solid fa-vault text-sm flex items-center justify-center h-4 w-4"></i>
                        </div>
                    </div>
                    <h3 id="kpi-total" class="text-2xl font-black text-slate-900 tracking-tight mt-2">-</h3>
                </div>
                <div id="growth-total" class="hidden"></div>
            </div>

            <!-- KPI 2: Segment 1 (Retail / Simpedes) -->
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-xs flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-start">
                        <p id="label-segment1" class="text-xs font-semibold uppercase tracking-wider text-slate-500">Segment 1</p>
                        <div class="p-2 bg-indigo-50 text-indigo-600 rounded-xl">
                            <i class="fa-solid fa-users text-sm flex items-center justify-center h-4 w-4"></i>
                        </div>
                    </div>
                    <h3 id="kpi-segment1" class="text-2xl font-black text-slate-900 tracking-tight mt-2">-</h3>
                </div>
                <div id="growth-segment1" class="hidden"></div>
            </div>

            <!-- KPI 3: Segment 2 (Wholesale / Britama) -->
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-xs flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-start">
                        <p id="label-segment2" class="text-xs font-semibold uppercase tracking-wider text-slate-500">Segment 2</p>
                        <div class="p-2 bg-purple-50 text-purple-600 rounded-xl">
                            <i class="fa-solid fa-building text-sm flex items-center justify-center h-4 w-4"></i>
                        </div>
                    </div>
                    <h3 id="kpi-segment2" class="text-2xl font-black text-slate-900 tracking-tight mt-2">-</h3>
                </div>
                <div id="growth-segment2" class="hidden"></div>
            </div>

            <!-- KPI 4: Top Dominant Product -->
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-xs flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-start">
                        <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">Top Product</p>
                        <div class="p-2 bg-amber-50 text-amber-600 rounded-xl">
                            <i class="fa-solid fa-crown text-sm flex items-center justify-center h-4 w-4"></i>
                        </div>
                    </div>
                    <h3 id="kpi-product" class="text-lg font-bold text-slate-900 truncate tracking-tight mt-2" title="-">-</h3>
                </div>
                <div id="growth-product" class="hidden"></div>
            </div>
        </div>

        <!-- BOTTOM DATA TABLE DETAILS -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-xs overflow-hidden">
            <div class="px-5 py-4 border-b border-slate-100 bg-slate-50/50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                <div>
                    <h3 class="font-bold text-slate-900 text-sm tracking-tight flex items-center gap-1.5">
                        <i class="fa-solid fa-list-ol text-blue-600 text-xs"></i> Top 10 Leaders Performance
                    </h3>
                    <p class="text-[11px] text-slate-500 font-medium">Berdasarkan pencapaian total booking pada periode aktif</p>
                </div>
            </div>
            
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse text-xs">
                    <thead>
                        <tr class="border-b border-slate-200 bg-slate-100 text-slate-600 font-semibold tracking-wider uppercase text-[10px]">
                            <th class="py-3 px-4 text-center w-12">Rank</th>
                            <th class="py-3 px-4 min-w-[150px]">Leader Name</th>
                            <th class="py-3 px-4 min-w-[120px]">Segment 1</th>
                            <th class="py-3 px-4 min-w-[120px]">Segment 2</th>
                            <th class="py-3 px-4 text-right min-w-[130px]">Total Booking</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100 text-slate-700 font-medium">
                        <!-- Data rows akan di-render di sini secara dinamis -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- CORE JAVASCRIPT LOGIC -->
    <script>
        // Global State
        let rawData = [];
        let currentFileName = "dana.csv";

        // DOM Elements
        const fileSelect = document.getElementById('file-select');
        const periodSelect = document.getElementById('period-select');
        const dashboardTitle = document.getElementById('dashboard-title');
        const asOfDateElement = document.getElementById('as-of-date');
        const loadingIndicator = document.getElementById('loading-indicator');

        // Event Listeners
        fileSelect.addEventListener('change', (e) => {
            currentFileName = e.target.value;
            loadDataAndInit(currentFileName);
        });

        periodSelect.addEventListener('change', () => {
            processAndRender();
        });

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            loadDataAndInit(currentFileName);
        });

        // Fetch CSV and Initialize Filter Option
        function loadDataAndInit(fileName) {
            loadingIndicator.classList.remove('hidden');
            loadingIndicator.classList.add('flex');

            // Simulasi fetch / Load data dari file lokal CSV Anda
            fetch(fileName)
                .then(response => {
                    if (!response.ok) throw new Error('File tidak ditemukan');
                    return response.text();
                })
                .then(text => {
                    rawData = parseCSV(text);
                    populatePeriodFilter();
                    processAndRender();
                })
                .catch(err => {
                    console.error("Error loading data:", err);
                    alert(`Gagal memuat file: ${fileName}. Pastikan file berada di direktori yang sama.`);
                })
                .finally(() => {
                    loadingIndicator.classList.add('hidden');
                    loadingIndicator.classList.remove('flex');
                });
        }

        // Simple CSV Parser handling quotes and commas
        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            if (lines.length === 0 || lines[0].trim() === "") return [];
            
            const headers = lines[0].split(',').map(h => h.trim().replace(/^["']|["']$/g, ''));
            const result = [];

            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim() === "") continue;
                
                // Regex to handle comma-separated values inside quotation marks
                const matches = lines[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || lines[i].split(',');
                const row = {};
                
                headers.forEach((header, index) => {
                    let val = matches[index] ? matches[index].trim() : "";
                    val = val.replace(/^["']|["']$/g, ''); // Remove outer quotes
                    row[header] = val;
                });
                result.push(row);
            }
            return result;
        }

        // Populate unique periods dynamically based on file type
        function populatePeriodFilter() {
            const previousSelection = periodSelect.value;
            periodSelect.innerHTML = "";
            
            const periods = [...new Set(rawData.map(item => item.Periode))].filter(Boolean);
            
            // Urutkan periode secara descending (terbaru di atas)
            periods.sort((a, b) => b.localeCompare(a));

            periods.forEach(p => {
                const option = document.createElement('option');
                option.value = p;
                option.textContent = p;
                periodSelect.appendChild(option);
            });

            // Pertahankan seleksi jika pilihan tersebut masih tersedia di file baru
            if (periods.includes(previousSelection)) {
                periodSelect.value = previousSelection;
            }
        }

        // Process, Aggregate, Filter, and Render Data UI
        function processAndRender() {
            const selectedPeriod = periodSelect.value;
            
            // Aturan Kustom: Hanya tampilkan teks "As of" saat filter periode aktif terisi
            if (selectedPeriod) {
                asOfDateElement.textContent = `As of Date: ${selectedPeriod}`;
                asOfDateElement.classList.remove('hidden');
            } else {
                asOfDateElement.classList.add('hidden');
            }

            // Atur nama label segment & Judul dinamis berdasarkan file aktif
            let g1 = "", g2 = "";
            if (currentFileName === "dana.csv") {
                dashboardTitle.textContent = "Dana Performance Dashboard";
                g1 = "Simpedes"; g2 = "Britama";
                document.getElementById('label-segment1').textContent = "Total Simpedes";
                document.getElementById('label-segment2').textContent = "Total Britama";
            } else {
                dashboardTitle.textContent = "Landing Performance Dashboard";
                g1 = "Retail"; g2 = "Wholesale";
                document.getElementById('label-segment1').textContent = "Total Retail";
                document.getElementById('label-segment2').textContent = "Total Wholesale";
            }

            // Cari tahu bulan sebelumnya untuk perhitungan MTD Growth (Format asumsi: YYYY-MM atau YYYYMM)
            const allPeriods = [...new Set(rawData.map(item => item.Periode))].filter(Boolean).sort();
            const currentIndex = allPeriods.indexOf(selectedPeriod);
            const prevPeriod = currentIndex > 0 ? allPeriods[currentIndex - 1] : null;

            // Filter data khusus periode aktif & periode sebelumnya
            const activeData = rawData.filter(item => item.Periode === selectedPeriod);
            const prevData = prevPeriod ? rawData.filter(item => item.Periode === prevPeriod) : [];

            updateKPIs(activeData, prevData, g1, g2);
            renderTable(activeData, g1, g2);
        }

        // Calculate and Update KPI Dashboard Blocks
        function updateKPIs(activeData, prevData, g1, g2) {
            let grandTotal = 0;
            let groupTotals = { [g1]: 0, [g2]: 0 };
            let productTotals = {};

            // Hitung data periode aktif
            activeData.forEach(item => {
                const booking = parseFloat(item.Booking) || 0;
                grandTotal += booking;

                if (item.Segment === g1) groupTotals[g1] += booking;
                if (item.Segment === g2) groupTotals[g2] += booking;

                const prod = item.Produk || "-";
                productTotals[prod] = (productTotals[prod] || 0) + booking;
            });

            // Cari Produk Dominan Teratas
            let topProduct = "-";
            let maxProdVal = -Infinity;
            for (const [prod, val] of Object.entries(productTotals)) {
                if (val > maxProdVal && prod !== "-") {
                    maxProdVal = val;
                    topProduct = prod;
                }
            }

            // Render nilai nominal utama ke UI KPI
            document.getElementById('kpi-total').textContent = formatNumber(grandTotal);
            document.getElementById('kpi-segment1').textContent = formatNumber(groupTotals[g1]);
            document.getElementById('kpi-segment2').textContent = formatNumber(groupTotals[g2]);
            
            const prodElement = document.getElementById('kpi-product');
            prodElement.textContent = topProduct;
            prodElement.title = topProduct;

            // HITUNG & UPDATE MTD GROWTH KHUSUS DANA.CSV (Dalam Miliar & %)
            const growthTotalEl = document.getElementById('growth-total');
            const growthSeg1El = document.getElementById('growth-segment1');
            const growthSeg2El = document.getElementById('growth-segment2');
            const growthProdEl = document.getElementById('growth-product');

            if (currentFileName === "dana.csv" && prevData.length > 0) {
                // Aggregasi data bulan sebelumnya
                let grandTotalPrev = 0;
                let groupTotalsPrev = { [g1]: 0, [g2]: 0 };
                let productTotalsPrev = {};

                prevData.forEach(item => {
                    const booking = parseFloat(item.Booking) || 0;
                    grandTotalPrev += booking;
                    if (item.Segment === g1) groupTotalsPrev[g1] += booking;
                    if (item.Segment === g2) groupTotalsPrev[g2] += booking;
                    const prod = item.Produk || "-";
                    productTotalsPrev[prod] = (productTotalsPrev[prod] || 0) + booking;
                });

                // Hitung selisih nominal nominal growth
                let growthTotal = grandTotal - grandTotalPrev;
                let growthG1 = groupTotals[g1] - groupTotalsPrev[g1];
                let growthG2 = groupTotals[g2] - groupTotalsPrev[g2];
                let growthTopProd = topProduct !== "-" ? (productTotals[topProduct] - (productTotalsPrev[topProduct] || 0)) : 0;

                // Format & Tampilkan Teks Growth (Satuan Miliar + Persentase)
                formatGrowthText(growthTotalEl, growthTotal, grandTotalPrev);
                formatGrowthText(growthSeg1El, growthG1, groupTotalsPrev[g1]);
                formatGrowthText(growthSeg2El, growthG2, groupTotalsPrev[g2]);
                formatGrowthText(growthProdEl, growthTopProd, productTotalsPrev[topProduct]);
            } else {
                // Sembunyikan container indikator growth jika bukan dana.csv atau data pembanding tidak ada
                growthTotalEl.classList.add('hidden');
                growthSeg1El.classList.add('hidden');
                growthSeg2El.classList.add('hidden');
                growthProdEl.classList.add('hidden');
            }
        }

        // Format Growth Text into Billion (M) and append Percentage (%)
        function formatGrowthText(element, growthValue, prevValue) {
            if(!element) return;
            element.classList.remove('hidden');
            
            // Konversi nilai nominal ke satuan Miliar (dibagi 1 Miliar)
            // Jika data mentah di database Anda sudah berbentuk Jutaan, ubah pembagi menjadi 1000
            const divisor = 1000000000; 
            const growthInBillion = growthValue / divisor;
            
            // Hitung persentase pertumbuhan terhadap bulan sebelumnya
            let growthPctText = "";
            if (prevValue && prevValue !== 0) {
                const pct = (growthValue / Math.abs(prevValue)) * 100;
                growthPctText = ` (${pct > 0 ? '+' : ''}${pct.toFixed(1)}%)`;
            } else if (growthValue > 0 && (!prevValue || prevValue === 0)) {
                growthPctText = " (+100%)";
            }

            // Tampilkan data dengan styling warna & indikator panah (Font ukuran besar)
            if (growthValue > 0) {
                element.className = "font-bold text-base md:text-lg tracking-tight mt-1 text-emerald-600";
                element.innerHTML = `<i class="fa-solid fa-arrow-up text-xs mr-0.5"></i>${growthInBillion.toFixed(1)} M${growthPctText}`;
            } else if (growthValue < 0) {
                element.className = "font-bold text-base md:text-lg tracking-tight mt-1 text-rose-600";
                element.innerHTML = `<i class="fa-solid fa-arrow-down text-xs mr-0.5"></i>${growthInBillion.toFixed(1)} M${growthPctText}`;
            } else {
                element.className = "font-bold text-base md:text-lg tracking-tight mt-1 text-slate-400";
                element.innerHTML = `0 M (0.0%)`;
            }
        }

        // Process, Sort, and Render Top 10 Leaders into HTML Table
        function renderTable(activeData, g1, g2) {
            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = "";

            // Aggregasi booking per Leader
            let leaderMap = {};
            activeData.forEach(item => {
                const leader = item.Leader || "Unknown Leader";
                const booking = parseFloat(item.Booking) || 0;
                
                if (!leaderMap[leader]) {
                    leaderMap[leader] = { name: leader, [g1]: 0, [g2]: 0, total: 0 };
                }
                
                if (item.Segment === g1) leaderMap[leader][g1] += booking;
                if (item.Segment === g2) leaderMap[leader][g2] += booking;
                leaderMap[leader].total += booking;
            });

            // Aturan Kustom: Diurutkan descending & batasi hanya Top 10 Booking
            const sortedLeaders = Object.values(leaderMap)
                .sort((a, b) => b.total - a.total)
                .slice(0, 10);

            if (sortedLeaders.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="5" class="py-8 text-center text-slate-400 font-medium bg-slate-50/50">
                            <i class="fa-solid fa-folder-open text-xl block mb-2 text-slate-300"></i> Tidak ada data pada periode ini
                        </td>
                    </tr>`;
                return;
            }

            // Render baris tabel data
            sortedLeaders.forEach((leader, index) => {
                const row = document.createElement('tr');
                row.className = "hover:bg-slate-50 transition-colors duration-150";
                
                // Styling kustom badge untuk peringkat Top 3
                let rankBadge = `<span class="font-bold text-slate-500">${index + 1}</span>`;
                if (index === 0) rankBadge = `<span class="flex items-center justify-center bg-amber-100 text-amber-700 h-6 w-6 rounded-full font-bold text-xs shadow-xs"><i class="fa-solid fa-crown text-[10px]"></i></span>`;
                if (index === 1) rankBadge = `<span class="flex items-center justify-center bg-slate-200 text-slate-800 h-6 w-6 rounded-full font-bold text-xs shadow-xs">2</span>`;
                if (index === 2) rankBadge = `<span class="flex items-center justify-center bg-orange-100 text-orange-800 h-6 w-6 rounded-full font-bold text-xs shadow-xs">3</span>`;

                row.innerHTML = `
                    <td class="py-3.5 px-4 text-center flex justify-center">${rankBadge}</td>
                    <td class="py-3.5 px-4 font-semibold text-slate-900">${leader.name}</td>
                    <td class="py-3.5 px-4 text-slate-600">${formatNumber(leader[g1])}</td>
                    <td class="py-3.5 px-4 text-slate-600">${formatNumber(leader[g2])}</td>
                    <td class="py-3.5 px-4 text-right font-bold text-blue-600">${formatNumber(leader.total)}</td>
                </td>`;
                tableBody.appendChild(row);
            });
        }

        // Helper: Format angka standar akuntansi (Ribuan dengan titik '.')
        function formatNumber(num) {
            return new Intl.NumberFormat('id-ID', {
                maximumFractionDigits: 0
            }).format(num);
        }
    </script>
</body>
</html>
